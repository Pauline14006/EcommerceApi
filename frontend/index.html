<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyStore — EcommerceAPI Shop</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <header>
        <div class="header-inner">
            <div class="logo">
                <span class="logo-icon">🛒</span>
                <div>
                    <div class="logo-text">Ecommerce</div>
                    <div class="logo-sub">Princess Torres + Pauline Gallamora</div>
                </div>
            </div>
            <div class="header-search">
                <input type="text" id="headerSearch" placeholder="Search products, brands and more..." />
                <button id="btnHeaderSearch">🔍 Search</button>
            </div>
        </div>
    </header>

    <!-- ── Category Nav ─────────────────────────────────────────── -->
    <nav class="category-nav">
        <div class="category-nav-inner">
            <button class="cat-btn active" data-cat="">All Products</button>
            <button class="cat-btn" data-cat="Electronics">Electronics</button>
            <button class="cat-btn" data-cat="Clothing">Clothing</button>
            <button class="cat-btn" data-cat="Accessories">Accessories</button>
            <button class="cat-btn" data-cat="Home">Home</button>
            <button class="cat-btn" data-cat="Sports">Sports</button>
            <button class="cat-btn" data-cat="Books">Books</button>
        </div>
    </nav>

    <!-- ── Page Layout ──────────────────────────────────────────── -->
    <div class="page-wrapper">

        <!-- ── Sidebar ──────────────────────────────────────────── -->
        <aside class="sidebar">

            <!-- Filter Card -->
            <div class="sidebar-card">
                <div class="sidebar-card-title">Filter Products</div>
                <div class="filter-group">
                    <label>Filter by</label>
                    <select id="filterType">
                        <option value="">— All Products —</option>
                        <option value="category">Category</option>
                        <option value="name">Name</option>
                        <option value="price">Max Price (₱)</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Value</label>
                    <input type="text" id="filterValue" placeholder="e.g. Electronics, 500..." />
                </div>
                <div class="filter-actions">
                    <button id="btnFilter">Search</button>
                    <button id="btnClear" class="secondary">Clear Filter</button>
                </div>
            </div>

            <!-- Add Product Card -->
            <div class="sidebar-card">
                <div class="sidebar-card-title">Add New Product</div>
                <div class="form-fields">
                    <input type="text"   id="newName"     placeholder="Product name *" />
                    <input type="text"   id="newCategory" placeholder="Category *" />
                    <input type="number" id="newPrice"    placeholder="Price (₱) *" step="0.01" min="0" />
                    <input type="number" id="newStock"    placeholder="Stock quantity" min="0" />
                    <input type="text"   id="newDesc"     placeholder="Description" />
                    <input type="text"   id="newImage"    placeholder="Image URL (optional)" />
                </div>
                <div class="form-actions">
                    <button id="btnAdd">Add Product</button>
                </div>
                <p id="formMsg" class="form-msg"></p>
            </div>

        </aside>

        <!-- ── Main Content ──────────────────────────────────────── -->
        <div class="main-content">
            <div class="results-bar">
                <span id="resultCount">Loading...</span>
                <span>MyStore Philippines</span>
            </div>

            <!-- Products injected here by fetchProducts() -->
            <main id="productGrid"></main>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
